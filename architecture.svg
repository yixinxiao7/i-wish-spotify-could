<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="vercelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d2433"/>
      <stop offset="100%" style="stop-color:#262f45"/>
    </linearGradient>
    <linearGradient id="renderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2433"/>
      <stop offset="100%" style="stop-color:#1f3050"/>
    </linearGradient>
    <linearGradient id="spotifyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2818"/>
      <stop offset="100%" style="stop-color:#133a20"/>
    </linearGradient>
    <linearGradient id="cfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1a0e"/>
      <stop offset="100%" style="stop-color:#2e2510"/>
    </linearGradient>
    <linearGradient id="urGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1218"/>
      <stop offset="100%" style="stop-color:#2e1524"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb923c"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f472b6"/>
    </marker>
    <marker id="arrowBlueBack" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#60a5fa"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="white" letter-spacing="0.5">i-wish-spotify-could — System Architecture</text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#94a3b8">Single-user web app for organizing uncategorized Spotify liked songs</text>

  <!-- ─── USER BROWSER (top center) ─── -->
  <g filter="url(#softShadow)">
    <rect x="490" y="88" width="220" height="72" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  </g>
  <text x="550" y="110" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="1">USER</text>
  <!-- Browser icon -->
  <rect x="500" y="116" width="28" height="22" rx="4" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="500" y1="122" x2="528" y2="122" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="504" cy="119" r="1.5" fill="#f87171"/>
  <circle cx="509" cy="119" r="1.5" fill="#fbbf24"/>
  <circle cx="514" cy="119" r="1.5" fill="#4ade80"/>
  <text x="538" y="126" font-size="12" font-weight="700" fill="white">Browser</text>
  <text x="538" y="139" font-size="9" fill="#94a3b8">Next.js App</text>
  <text x="500" y="153" font-size="8.5" fill="#64748b">sessionStorage: token_expiry</text>

  <!-- ─── CLOUDFLARE (left) ─── -->
  <g filter="url(#softShadow)">
    <rect x="40" y="200" width="190" height="90" rx="12" fill="url(#cfGrad)" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="60" y="222" font-size="11" fill="#f59e0b" font-weight="600" letter-spacing="1">DNS</text>
  <!-- Cloudflare cloud icon -->
  <ellipse cx="64" cy="244" rx="12" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <ellipse cx="56" cy="248" rx="8" ry="6" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <ellipse cx="72" cy="248" rx="8" ry="6" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="84" y="238" font-size="12" font-weight="700" fill="#fbbf24">Cloudflare</text>
  <text x="84" y="252" font-size="9" fill="#d97706">yixinx.com</text>
  <text x="60" y="270" font-size="8.5" fill="#92400e">CNAME → vercel-dns-017.com</text>
  <text x="60" y="282" font-size="8.5" fill="#92400e">i-wish-spotify-could subdomain</text>

  <!-- ─── VERCEL (center-left) ─── -->
  <g filter="url(#softShadow)">
    <rect x="310" y="195" width="220" height="108" rx="12" fill="url(#vercelGrad)" stroke="#818cf8" stroke-width="1.5"/>
  </g>
  <text x="330" y="217" font-size="11" fill="#818cf8" font-weight="600" letter-spacing="1">FRONTEND</text>
  <!-- Vercel triangle icon -->
  <polygon points="330,244 346,244 338,231" fill="white"/>
  <text x="354" y="240" font-size="12" font-weight="700" fill="white">Vercel</text>
  <text x="354" y="253" font-size="9" fill="#a5b4fc">Next.js 15 · React 19 · TS</text>
  <text x="330" y="268" font-size="8.5" fill="#6366f1">Pages: / · /login · /callback · /organize</text>
  <text x="330" y="280" font-size="8.5" fill="#6366f1">Components: SongCard · shadcn/ui</text>
  <text x="330" y="292" font-size="8.5" fill="#64748b">i-wish-spotify-could.yixinx.com</text>

  <!-- ─── RENDER (center-right) ─── -->
  <g filter="url(#softShadow)">
    <rect x="620" y="195" width="220" height="122" rx="12" fill="url(#renderGrad)" stroke="#38bdf8" stroke-width="1.5"/>
  </g>
  <text x="640" y="217" font-size="11" fill="#38bdf8" font-weight="600" letter-spacing="1">BACKEND</text>
  <!-- Server icon -->
  <rect x="630" y="226" width="28" height="20" rx="3" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="630" y1="232" x2="658" y2="232" stroke="#38bdf8" stroke-width="1"/>
  <circle cx="652" cy="229" r="2" fill="#4ade80"/>
  <text x="666" y="237" font-size="12" font-weight="700" fill="white">Render</text>
  <text x="666" y="250" font-size="9" fill="#7dd3fc">FastAPI 0.115 · Python 3 · Uvicorn</text>
  <text x="640" y="265" font-size="8.5" fill="#0ea5e9">Routers: oauth · songs · playlists · playback</text>
  <text x="640" y="277" font-size="8.5" fill="#0ea5e9">State: token.json · user_id.json · songs.json</text>
  <text x="640" y="289" font-size="8.5" fill="#64748b">i-wish-spotify-could-api.onrender.com</text>
  <text x="640" y="301" font-size="8.5" fill="#64748b">GET+HEAD /health · Free tier</text>

  <!-- ─── SPOTIFY API (bottom center) ─── -->
  <g filter="url(#softShadow)">
    <rect x="490" y="440" width="220" height="96" rx="12" fill="url(#spotifyGrad)" stroke="#22c55e" stroke-width="1.5"/>
  </g>
  <text x="510" y="462" font-size="11" fill="#22c55e" font-weight="600" letter-spacing="1">EXTERNAL API</text>
  <!-- Spotify circle icon -->
  <circle cx="518" cy="487" r="13" fill="none" stroke="#1db954" stroke-width="2"/>
  <path d="M512,483 Q518,479 524,483" stroke="#1db954" stroke-width="1.5" fill="none"/>
  <path d="M511,488 Q518,483 525,488" stroke="#1db954" stroke-width="1.5" fill="none"/>
  <path d="M512,493 Q518,490 524,493" stroke="#1db954" stroke-width="1.5" fill="none"/>
  <text x="538" y="483" font-size="12" font-weight="700" fill="#1db954">Spotify API</text>
  <text x="538" y="496" font-size="9" fill="#4ade80">OAuth 2.0 · Liked Songs</text>
  <text x="510" y="512" font-size="8.5" fill="#166534">Playlists · Playback · User Profile</text>
  <text x="510" y="524" font-size="8.5" fill="#166534">Retry on 429 · Token refresh (–60s)</text>

  <!-- ─── UPTIMEROBOT (right) ─── -->
  <g filter="url(#softShadow)">
    <rect x="930" y="200" width="190" height="90" rx="12" fill="url(#urGrad)" stroke="#f472b6" stroke-width="1.5"/>
  </g>
  <text x="950" y="222" font-size="11" fill="#f472b6" font-weight="600" letter-spacing="1">MONITORING</text>
  <!-- Pulse/heartbeat icon -->
  <polyline points="950,244 958,244 961,235 966,254 971,238 975,244 983,244" stroke="#f472b6" stroke-width="1.8" fill="none"/>
  <text x="992" y="240" font-size="12" font-weight="700" fill="#f9a8d4">UptimeRobot</text>
  <text x="992" y="253" font-size="9" fill="#ec4899">HEAD /health · every 5 min</text>
  <text x="950" y="270" font-size="8.5" fill="#9d174d">Prevents Render free-tier spin-down</text>
  <text x="950" y="282" font-size="8.5" fill="#9d174d">Alerts via email on downtime</text>

  <!-- ─── GITHUB (bottom-right) ─── -->
  <g filter="url(#softShadow)">
    <rect x="900" y="380" width="190" height="68" rx="12" fill="#1a1f2e" stroke="#475569" stroke-width="1.5"/>
  </g>
  <text x="920" y="402" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="1">SOURCE</text>
  <circle cx="936" cy="422" r="11" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="954" y="418" font-size="12" font-weight="700" fill="white">GitHub</text>
  <text x="954" y="431" font-size="8.5" fill="#64748b">yixinxiao7/i-wish-spotify-could</text>
  <text x="920" y="443" font-size="8.5" fill="#475569">main → auto-deploy to Render</text>

  <!-- ═══════════ ARROWS ═══════════ -->

  <!-- User ↔ Cloudflare (DNS resolution) -->
  <line x1="490" y1="135" x2="230" y2="215" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <text x="330" y="162" font-size="9.5" fill="#f59e0b">DNS lookup</text>

  <!-- Cloudflare → Vercel (CNAME resolves) -->
  <line x1="230" y1="248" x2="308" y2="248" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="248" y="241" font-size="9" fill="#f59e0b">CNAME</text>

  <!-- User ↔ Vercel (HTTPS page load) -->
  <line x1="560" y1="160" x2="480" y2="195" stroke="#818cf8" stroke-width="1.8" marker-end="url(#arrowBlue)" marker-start="url(#arrowBlueBack)"/>
  <text x="530" y="180" font-size="9.5" fill="#818cf8">HTTPS</text>

  <!-- Vercel (frontend) ↔ Render (backend) API calls -->
  <line x1="530" y1="249" x2="618" y2="249" stroke="#60a5fa" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowBlue)" marker-start="url(#arrowBlueBack)"/>
  <text x="554" y="241" font-size="9.5" fill="#60a5fa">REST API</text>
  <text x="562" y="265" font-size="9" fill="#60a5fa">/api/*</text>

  <!-- Render ↔ Spotify API -->
  <line x1="720" y1="317" x2="700" y2="440" stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)" marker-start="url(#arrowBlueBack)"/>
  <text x="722" y="395" font-size="9.5" fill="#22c55e">Spotify</text>
  <text x="722" y="407" font-size="9.5" fill="#22c55e">API calls</text>

  <!-- Vercel → Spotify OAuth redirect -->
  <line x1="440" y1="303" x2="510" y2="440" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="446" y="370" font-size="9.5" fill="#22c55e">OAuth</text>
  <text x="446" y="382" font-size="9.5" fill="#22c55e">redirect</text>

  <!-- UptimeRobot → Render (HEAD /health) -->
  <line x1="930" y1="248" x2="842" y2="248" stroke="#f472b6" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowPink)"/>
  <text x="866" y="241" font-size="9" fill="#f472b6">HEAD /health</text>

  <!-- GitHub → Render (auto deploy) -->
  <line x1="960" y1="380" x2="835" y2="317" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <text x="900" y="338" font-size="9.5" fill="#94a3b8">auto-deploy</text>

  <!-- GitHub → Vercel (auto deploy) -->
  <line x1="900" y1="410" x2="525" y2="303" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <text x="690" y="345" font-size="9.5" fill="#94a3b8">auto-deploy</text>

  <!-- ─── LEGEND ─── -->
  <rect x="40" y="610" width="420" height="92" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="56" y="632" font-size="11" fill="#94a3b8" font-weight="600">LEGEND</text>
  <!-- solid arrow -->
  <line x1="56" y1="648" x2="96" y2="648" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="104" y="652" font-size="10.5" fill="#94a3b8">HTTPS request/response</text>
  <!-- dashed arrow -->
  <line x1="56" y1="666" x2="96" y2="666" stroke="#60a5fa" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="104" y="670" font-size="10.5" fill="#94a3b8">Async / background call</text>
  <!-- orange -->
  <line x1="56" y1="684" x2="96" y2="684" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <text x="104" y="688" font-size="10.5" fill="#94a3b8">DNS resolution</text>
  <!-- pink -->
  <line x1="230" y1="648" x2="270" y2="648" stroke="#f472b6" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowPink)"/>
  <text x="278" y="652" font-size="10.5" fill="#94a3b8">Health monitoring (HEAD)</text>
  <!-- green -->
  <line x1="230" y1="666" x2="270" y2="666" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="278" y="670" font-size="10.5" fill="#94a3b8">Spotify API call</text>
  <!-- gray -->
  <line x1="230" y1="684" x2="270" y2="684" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <text x="278" y="688" font-size="10.5" fill="#94a3b8">Git push → auto-deploy</text>

  <!-- ─── TECH STACK SUMMARY (bottom right) ─── -->
  <rect x="596" y="610" width="420" height="92" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="612" y="632" font-size="11" fill="#94a3b8" font-weight="600">KEY BEHAVIORS</text>
  <text x="612" y="648" font-size="10.5" fill="#64748b">• File-based state: token.json, user_id.json, songs.json (single user)</text>
  <text x="612" y="664" font-size="10.5" fill="#64748b">• Token refresh buffer: 60s before expiry · tenacity retry on 429</text>
  <text x="612" y="680" font-size="10.5" fill="#64748b">• Auth gating via sessionStorage.token_expiry in layout.tsx</text>
  <text x="612" y="696" font-size="10.5" fill="#64748b">• ThreadPoolExecutor(10) for parallel playlist song additions</text>
</svg>
